<!DOCTYPE html>
<html lang="es-MX">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal agentes — Mirador Costalegre</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/animations.css">
    <style>
        .agent-wrap {
            min-height: calc(100vh - 72px);
            display: grid;
            grid-template-columns: 1fr 1fr;
            align-items: center;
        }
        .agent-visual {
            height: 100%;
            background: var(--olive-dark);
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .agent-visual img {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.5;
        }
        .agent-visual::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(31,40,34,0.75), rgba(31,40,34,0.4));
        }
        .agent-visual-text {
            position: relative;
            z-index: 2;
            color: var(--cream);
            text-align: center;
            padding: 3rem;
        }
        .agent-visual-text h2 {
            font-family: var(--serif);
            font-size: clamp(2.5rem, 5vw, 4.5rem);
            line-height: 1;
            font-weight: 400;
        }
        .agent-visual-text h2 em { font-style: italic; color: var(--gold); }
        .agent-visual-text p { max-width: 380px; margin: 1.5rem auto; line-height: 1.7; opacity: 0.85; }

        .agent-form {
            padding: 4rem 3rem;
            max-width: 520px;
            margin: 0 auto;
            width: 100%;
        }
        .agent-form h1 {
            font-family: var(--serif);
            font-size: clamp(2.5rem, 4vw, 3.5rem);
            font-weight: 400;
            line-height: 1;
            margin-bottom: 1rem;
        }
        .agent-form > p { color: var(--ink-soft); margin-bottom: 2.5rem; }
        .agent-links {
            margin-top: 2rem;
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
        }
        .agent-links a { opacity: 0.6; transition: opacity 0.3s; }
        .agent-links a:hover { opacity: 1; }

        @media (max-width: 900px) {
            .agent-wrap { grid-template-columns: 1fr; }
            .agent-visual { min-height: 40vh; }
        }
    </style>
</head>
<body class="page-body">
    <div id="headerMount"></div>

    <section class="agent-wrap">
        <div class="agent-visual reveal">
            <img src="https://images.unsplash.com/photo-1613977257363-707ba9348227?auto=format&fit=crop&w=1800&q=85" alt="Mirador Costalegre">
            <div class="agent-visual-text">
                <h2>Portal de <em>agentes</em></h2>
                <p>Material exclusivo, comisiones actualizadas y calendario de disponibilidad en tiempo real para nuestros partners certificados.</p>
            </div>
        </div>

        <div class="agent-form reveal">
            <h1>Acceso <span style="font-style:italic; color: var(--olive);">partners</span></h1>
            <p>Ingresa con tu cuenta autorizada o solicita afiliación.</p>

            <form onsubmit="event.preventDefault(); alert('Iniciando sesión...');">
                <div class="form-row">
                    <label for="agEmail">Correo</label>
                    <input type="email" id="agEmail" required>
                </div>
                <div class="form-row" style="margin-top: 1.5rem;">
                    <label for="agPass">Contraseña</label>
                    <input type="password" id="agPass" required>
                </div>
                <button type="submit" class="form-submit" style="margin-top: 2rem;">
                    Iniciar sesión
                    <svg viewBox="0 0 24 24" width="14"><path d="M5 12h14M13 5l7 7-7 7" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
                </button>
            </form>

            <div class="agent-links">
                <a href="#">¿Olvidaste contraseña?</a>
                <a href="contacto.html">Solicitar afiliación →</a>
            </div>
        </div>
    </section>

    <div id="footerMount"></div>
    <script src="_partials.js"></script>
    <script src="../js/main.js"></script>
</body>
</html>
